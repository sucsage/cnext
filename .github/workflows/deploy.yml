name: Build & Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # lib_dev/*.c is private (gitignored). EC2 links against lib/libcnext.a.
      # Fail fast if the dev forgot to run `make lib-pack` before pushing.
      - name: Verify prebuilt library
        run: |
          for f in lib/libcnext.a \
                   lib/include/server.h \
                   lib/include/pages.h \
                   lib/include/db/db.h; do
            if [ ! -f "$f" ]; then
              echo "::error::missing $f — run 'make lib-pack' (or 'make pack-docker' on macOS) before pushing"
              exit 1
            fi
          done
          echo "lib/ OK — $(du -h lib/libcnext.a | cut -f1) libcnext.a"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/cnext

            echo "=== Pull latest code ==="
            git pull origin main

            echo "=== Ensure build deps ==="
            # only install deps that aren't already present (liburing is built from
            # source to /usr/local — don't let apt shadow it with an older version)
            dpkg -s libcurl4-openssl-dev >/dev/null 2>&1 || \
              sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev

            echo "=== Build (consumer mode — uses lib/libcnext.a) ==="
            make clean && make

            echo "=== Restart service ==="
            sudo systemctl restart cnext

            echo "=== Status ==="
            sudo systemctl is-active cnext
            echo "Deploy complete!"
