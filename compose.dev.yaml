services:
  dev:
    build:
      context: .
      target: dev
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./src:/app/src
      - ./lib:/app/lib
      - ./main.c:/app/main.c
      - ./Makefile:/app/Makefile
      - ./tools:/app/tools
      - ./public:/app/public
      - ./data:/app/data
      - ./certs:/app/certs:ro
    security_opt:
      - seccomp:unconfined   # io_uring syscalls
    cap_add:
      - SYS_NICE             # IORING_SETUP_SQPOLL
    ulimits:
      nofile: 65536
      memlock: -1